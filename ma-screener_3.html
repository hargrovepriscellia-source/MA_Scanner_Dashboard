async function getLivePrice(pair) {
  const url = `${OANDA_URL}/accounts/${OANDA_ACCOUNT}/pricing?instruments=${pair}`;

  const response = await fetch(url, {
    headers: {
      "Authorization": `Bearer ${OANDA_API_KEY}`
    }
  });

  const data = await response.json();
  const priceObj = data.prices[0];

  return {
    bid: parseFloat(priceObj.closeoutBid),
    ask: parseFloat(priceObj.closeoutAsk),
    mid: (parseFloat(priceObj.closeoutBid) + parseFloat(priceObj.closeoutAsk)) / 2
  };
}

async function updateLivePrices() {
  for (let row of rows) {
    const priceData = await getLivePrice(row.symbol);
    row.price = priceData.mid;
  }
  renderTable();
}

const tbody = document.querySelector("#scanner tbody");


function renderTable() {
  tbody.innerHTML = "";

  rows.forEach(row => {
    const rating = computeMARating(row.price, row.sma20, row.sma50, row.sma200);

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${row.symbol}</td>
      <td><span class="rating ${rating.cls}">${rating.label}</span></td>
      <td>${row.price.toFixed(4)}</td>
      <td>${row.sma20.toFixed(4)}</td>
      <td>${row.sma50.toFixed(4)}</td>
      <td>${row.sma200.toFixed(4)}</td>
      <td>${row.bbUp.toFixed(4)}</td>
      <td>${row.bbLow.toFixed(4)}</td>
    `;
    tbody.appendChild(tr);
  });
}


// --- 2. RATING ENGINE (MIMICS TRADINGVIEW STYLE) ---
function computeMARating(price, sma20, sma50, sma200) {
  let score = 0;

  // Price vs MA
  if (price > sma20) score += 1; else score -= 1;
  if (price > sma50) score += 1; else score -= 1;
  if (price > sma200) score += 1; else score -= 1;

  // MA vs MA alignment (trend stack)
  if (sma20 > sma50) score += 1; else score -= 1;
  if (sma50 > sma200) score += 1; else score -= 1;

  // Map score to rating
  if (score >= 4) return { label: "Strong Buy", cls: "strong-buy" };
  if (score >= 2) return { label: "Buy", cls: "buy" };
  if (score <= -4) return { label: "Strong Sell", cls: "strong-sell" };
  if (score <= -2) return { label: "Sell", cls: "sell" };
  return { label: "Neutral", cls: "neutral" };
}
