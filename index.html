<body>

<h1>FX Moving Averages Scanner</h1>

<div style="margin-bottom: 15px;">
  <label style="font-weight:600; margin-right:10px;">Timeframe:</label>
  <select id="tfSelect" onchange="changeTimeframe()">
    <option value="M1">M1</option>
    <option value="M5">M5</option>
    <option value="M15">M15</option>
    <option value="M30">M30</option>
    <option value="H1" selected>H1</option>
    <option value="H2">H2</option>
    <option value="H3">H3</option>
    <option value="H4">H4</option>
    <option value="D">D1</option>
    <option value="W">W1</option>
    <option value="M">MN1</option>
  </select>
</div>

<table id="scanner">
  <thead>
    <tr>
      <th>Ticker</th>
      <th>MA Rating</th>
      <th>Price</th>
      <th>SMA20</th>
      <th>SMA50</th>
      <th>SMA200</th>
      <th>BB Up</th>
      <th>BB Low</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>

const tbody = document.querySelector("#scanner tbody");


async function getLivePrice(pair) {
  const res = await fetch(`/api/price?pair=${pair}`);
  return await res.json();
}

async function getCandles(pair, timeframe) {
  const res = await fetch(`/api/candles?pair=${pair}&tf=${timeframe}`);
  const data = await res.json();
  return data.candles || [];
}

let currentTF = "H1";

function changeTimeframe() {
  const tf = document.getElementById("tfSelect").value;
  currentTF = tf;
  console.log("Timeframe changed to:", currentTF);
}

{ symbol: "GBP_AUD", price: 0, sma20: 0, sma50: 0, sma200: 0, bbUp: 0, bbLow: 0 },

async function getCandles(pair, timeframe) {
  const response = await fetch(`/api/candles?pair=${pair}&tf=${timeframe}`);
  const data = await response.json();
  return data.candles || [];
}

function SMA(values, length) {
  if (values.length < length) return 0;
  const slice = values.slice(-length);
  const sum = slice.reduce((a, b) => a + b, 0);
  return sum / length;
}

function BollingerBands(values, length = 20, mult = 2) {
  if (values.length < length) return { upper: 0, lower: 0 };

  const slice = values.slice(-length);
  const mean = slice.reduce((a, b) => a + b, 0) / length;

  const variance = slice.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / length;
  const std = Math.sqrt(variance);

  return {
    upper: mean + mult * std,
    lower: mean - mult * std
  };
}

function bias(price, sma) {
  if (!sma) return "N";
  if (price > sma) return "B";
  if (price < sma) return "S";
  return "N";
}

function bbBias(price, upper, lower) {
  if (!upper || !lower) return "N";
  if (price > upper) return "B";
  if (price < lower) return "S";
  return "N";
}

function trendStack(s20, s50, s200, price) {
  if (!s20 || !s50 || !s200) return "N";

  const bull = s20 > s50 && s50 > s200 && price > s20;
  const bear = s20 < s50 && s50 < s200 && price < s20;

  if (bull) return "B";
  if (bear) return "S";
  return "N";
}

function colorize(letter) {
  if (letter === "B") return `<span style="color:#00ff00;font-weight:bold">B</span>`;
  if (letter === "S") return `<span style="color:#ff4444;font-weight:bold">S</span>`;
  return `<span style="color:#888">N</span>`;
}

 
async function updateLivePrices() {
  const timeframe = document.querySelector("#tfSelect").value;


  for (let row of rows) {
    // 1. Get live price
    const priceData = await getLivePrice(row.symbol);
    row.price = priceData.mid;

    // 2. Get candles for selected timeframe
    const candles = await getCandles(row.symbol, timeframe);
    const closes = candles.map(c => c.close);

    // 3. Compute SMAs
    row.sma20 = SMA(closes, 20);
    row.sma50 = SMA(closes, 50);
    row.sma200 = SMA(closes, 200);

    // 4. Compute Bollinger Bands
    const bb = BollingerBands(closes, 20, 2);
    row.bbUp = bb.upper;
    row.bbLow = bb.lower;

    // 5. Compute Bias
    row.bias20 = bias(row.price, row.sma20);
    row.bias50 = bias(row.price, row.sma50);
    row.bias200 = bias(row.price, row.sma200);
    row.bbBias = bbBias(row.price, row.bbUp, row.bbLow);

    // 6. Compute Trend Stack (TradingView style)
    row.trend = trendStack(row.sma20, row.sma50, row.sma200, row.price);
  }

  renderTable();
}

function renderTable() {
  tbody.innerHTML = "";

  rows.forEach(row => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row.symbol}</td>
      <td>${row.price.toFixed(4)}</td>

      <td>${row.sma20.toFixed(4)}</td>
      <td>${colorize(row.bias20)}</td>

      <td>${row.sma50.toFixed(4)}</td>
      <td>${colorize(row.bias50)}</td>

      <td>${row.sma200.toFixed(4)}</td>
      <td>${colorize(row.bias200)}</td>

      <td>${row.bbUp.toFixed(4)}</td>
      <td>${row.bbLow.toFixed(4)}</td>
      <td>${colorize(row.bbBias)}</td>

      <td>${colorize(row.trend)}</td>
    `;

    tbody.appendChild(tr);
  });
}

// --- 2. RATING ENGINE (MIMICS TRADINGVIEW STYLE) ---
function computeMARating(price, sma20, sma50, sma200) {
  let score = 0;

  // Price vs MA
  if (price > sma20) score += 1; else score -= 1;
  if (price > sma50) score += 1; else score -= 1;
  if (price > sma200) score += 1; else score -= 1;

  // MA vs MA alignment (trend stack)
  if (sma20 > sma50) score += 1; else score -= 1;
  if (sma50 > sma200) score += 1; else score -= 1;

  // Map score to rating
  if (score >= 4) return { label: "Strong Buy", cls: "strong-buy" };
  if (score >= 2) return { label: "Buy", cls: "buy" };
  if (score <= -4) return { label: "Strong Sell", cls: "strong-sell" };
  if (score <= -2) return { label: "Sell", cls: "sell" };
  return { label: "Neutral", cls: "neutral" };
}

updateLivePrices();
